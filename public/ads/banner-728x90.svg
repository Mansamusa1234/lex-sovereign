<svg xmlns="http://www.w3.org/2000/svg" width="728" height="90" viewBox="0 0 728 90">
  <rect width="728" height="90" fill="#020617"/>
  <rect width="728" height="90" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <line x1="0" y1="0" x2="728" y2="90" stroke="#f59e0b" stroke-width="0.3" opacity="0.05"/>
  <!-- Logo -->
  <rect x="12" y="22" width="46" height="46" rx="10" fill="#f59e0b"/>
  <text x="35" y="52" font-family="system-ui" font-size="22" fill="#020617" text-anchor="middle">⚖</text>
  <!-- Brand -->
  <text x="70" y="38" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b" font-weight="900" letter-spacing="1">LEX SOVEREIGN</text>
  <text x="70" y="56" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">AI Legal Research · Not a Lawyer</text>
  <!-- Headline -->
