  <text x="260" y="63" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">FDCPA · FCRA · UCC 1-308 · All Rights Reserved</text>
  <!-- CTA Button -->
  <rect x="580" y="20" width="138" height="50" rx="10" fill="#f59e0b"/>
  <text x="649" y="51" font-family="system-ui,sans-serif" font-size="14" fill="#020617" font-weight="900" text-anchor="middle">START FREE →</text>
  <!-- Border -->
  <rect width="728" height="90" rx="0" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
