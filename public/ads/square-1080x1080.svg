  <!-- Features -->
  <text x="180" y="800" font-family="system-ui,sans-serif" font-size="22" fill="#64748b">⚡ 3 AI Agents</text>
  <text x="380" y="800" font-family="system-ui,sans-serif" font-size="22" fill="#64748b">📋 30+ Laws</text>
